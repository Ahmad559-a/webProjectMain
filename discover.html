<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style/discover.css">

</head>
<body>
    <img src="./assets/branch.png" alt="branch.png" id="branch1">
    <header>

        <nav>

            <a href="places.html">Places</a>
